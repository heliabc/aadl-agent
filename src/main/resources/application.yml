server:
  port: 8080

spring:
  application:
    name: aadl-agent

file:
  input-path: ./input
  output-path: ./output

ollama:
  base-url: http://localhost:11434
  chat-model: qwen3:8b
  embedding-model: qwen3-embedding:latest
  timeout: 300000

deepseek:
  api-key: ""
  base-url: https://api.deepseek.com
  chat-model: deepseek-chat
  embedding-model: deepseek-embedding
  timeout: 300000

rag:
  top-k: 5
  rerank-top-k: 3
  rrf-k: 60

agent:
  requirement:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
  architecture:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
  module:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
  aadl:
    max-retries: 3
    temperature: 0.1
    max-tokens: 16384