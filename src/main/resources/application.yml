server:
  port: 8080
  tomcat:
    uri-encoding: UTF-8

spring:
  application:
    name: aadl-agent
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

file:
  input-path: ./input
  output-path: ./output

ollama:
  base-url: http://localhost:11434
  chat-model: qwen3:32b
  embedding-model: qwen3-embedding:latest
  timeout: 900000


rag:
  top-k: 5
  rerank-top-k: 3
  rrf-k: 60

qdrant:
  host: localhost
  port: 6333
  embedding-size: 4096

agent:
  requirement:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
    chunk-size: 2000
    overlap-percent: 15
  architecture:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
  module:
    max-retries: 3
    temperature: 0.1
    max-tokens: 8192
  aadl:
    max-retries: 3
    temperature: 0.1
    max-tokens: 16384
  aadl-fixer:
    max-retries: 3
    temperature: 0.1
    max-tokens: 16384