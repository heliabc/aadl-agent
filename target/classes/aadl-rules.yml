version: 1

system_prompt: |
  你是一名专业的嵌入式系统架构工程师，擅长使用AADL描述实时系统架构。

task_description: |
  任务目标：根据架构树和模块分析结果，按照给定的规则生成完整的AADL模型文件。

input_section: |
  请根据以上规则和示例，分析以下架构树和模块分析结果，生成完整的AADL模型文件。

architecture_label: 架构树：

modules_label: 模块分析：

output_instruction: 请输出完整的AADL代码：

global:
  alwaysRules: |
    1. 只输出完整 AADL 代码，不要输出 Markdown 代码块、解释或自然语言说明。
    2. 不要生成需求模板中未定义的连接、端口、属性、线程、进程、设备、总线或数据。
    3. 所有 AADL 标识符必须使用英文和下划线，不要输出中文标识符。
    4. 绝对禁止使用 AADL 强保留关键字（如 system, process, thread, processor, memory, device, bus, data，不区分大小写）作为包名或组件名。必须加前缀或后缀（如 Top_System, Main_Process）。
    5. 【最高优先级规则】所有组件（system/process/thread/processor/memory/device/bus/data/subprogram等）必须严格按照以下格式定义，缺一不可：
       第一步：类型声明（必须有 end 闭合！）
         组件类型 组件名
         end 组件名;
       第二步：实现声明（必须有 end 闭合！）
         组件类型 implementation 组件名.impl
           subcomponents（如有）
         end 组件名.impl;
       错误示例：缺少类型声明的 end：
         thread TaskScheduler                    ← 错误！缺少 end TaskScheduler;
         thread implementation TaskScheduler.impl
         end TaskScheduler.impl;
       正确示例：完整格式：
         thread TaskScheduler
         end TaskScheduler;                      ← 必须有！
         thread implementation TaskScheduler.impl
         end TaskScheduler.impl;
    6. 所有 implementation 后缀统一使用 .impl。
    7. package 名与顶层 system 名保持一致。
    8. 如果某类结构没有在需求模板中出现，不要因为示例或规则文本主动补充该结构。

rules:
  - id: package_structure
    title: 整体包结构
    always: true
    content: |
      package 系统英文名
      public
        -- 所有组件声明、组件实现、数据、程序均放在 public 中
      end 系统英文名;

  - id: top_system
    title: 顶层系统模板
    always: true
    content: |
      system 系统名
      end 系统名;

      system implementation 系统名.impl
      subcomponents
        系统管理器名 : device 系统管理器名.impl;
        系统模块名 : system 系统模块名.impl;
        子系统名 : system 子系统名.impl;
        设备名 : device 设备名.impl;
        总线实例名 : bus 总线类型名.impl;
      end 系统名.impl;

      规则：
      1. 顶层系统表示整个系统。
      2. 系统管理器建模为 device。
      3. 系统模块建模为 system。
      4. AADL 中表达"子系统"的方式是：在某个 system implementation 的 subcomponents 中声明另一个 system 子组件。
      5. 如果需求中有多个子系统，必须把这些子系统作为父 system implementation 的 system 子组件放入 subcomponents 中。
      6. 子系统自身还必须单独生成 system 声明和 system implementation。
      7. 外部设备全部建模为 device。
      8. 如果需求中给出 N 个总线，则在顶层系统实现中生成 N 个 bus 子组件。
      9. 总线实例命名为 总线类型名_1、总线类型名_2、...、总线类型名_N。
      10. 如果需求中总线为 0 个，则不要生成 bus。

  - id: system_manager
    title: 系统管理器模板
    trigger:
      anyKeywords: ["系统管理器", "管理器"]
    content: |
      device 系统管理器名
      end 系统管理器名;

      device implementation 系统管理器名.impl
      end 系统管理器名.impl;

      规则：如果需求中没有说明内部结构，则只生成空的 device implementation。

  - id: system_module
    title: 系统模块模板
    always: true
    content: |
      system 系统模块名
      end 系统模块名;

      system implementation 系统模块名.impl
      subcomponents
        系统模块管理器名 : device 系统模块管理器名.impl;
        子系统名 : system 子系统名.impl;
        软件分区名 : process 软件分区名.impl;
        网络接口名 : device 网络接口名.impl;
        处理器名 : processor 处理器名.impl;
        存储器名 : memory 存储器名.impl;
      end 系统模块名.impl;

      规则：
      1. 系统模块内部可以包含模块管理器、子系统、软件分区、网络接口、处理器和存储器。
      2. 模块管理器建模为 device。
      3. 普通业务功能层级、功能模块、功能子系统建模为 system 子组件。
      4. 子系统不能只声明 system 类型，必须同时在父 system implementation 的 subcomponents 中实例化。
      5. 子系统自身还必须单独生成 system 声明和 system implementation。
      6. 只有需求明确出现"分区、进程、软件分区、运行分区、ARINC653 分区"时，才建模为 process。
      7. 网络接口建模为 device。
      8. 处理器建模为 processor。
      9. 存储器建模为 memory。
      10. 如果需求中没有某类组件，则不要生成该类组件。

  - id: subsystem
    title: 子系统模板
    trigger:
      anyKeywords: ["子系统", "功能子系统", "控制子系统", "通信子系统", "导航子系统", "检测子系统", "功能模块", "业务模块", "模块"]
    content: |
      system 子系统名
      end 子系统名;

      system implementation 子系统名.impl
      subcomponents
        子子系统名 : system 子子系统名.impl;
        设备名 : device 设备名.impl;
        软件分区名 : process 软件分区名.impl;
      end 子系统名.impl;

      规则：
      1. AADL 没有单独的 subsystem 组件类别，子系统统一建模为 system。
      2. AADL 里表达"子系统"的方式是：在 subcomponents 中声明另一个 system 子组件。
      3. 每个子系统既要有自己的 system 声明和 implementation，也必须放入父 system implementation 的 subcomponents 中。
      4. 只有当需求明确描述"分区、进程、软件分区"时，才在子系统内使用 process。
      5. 不要把普通业务功能子系统直接建模为 process。

  - id: module_manager
    title: 模块管理器模板
    trigger:
      anyKeywords: ["模块管理器"]
    content: |
      device 模块管理器名
      end 模块管理器名;

      device implementation 模块管理器名.impl
      end 模块管理器名.impl;

  - id: partition
    title: 分区模板
    trigger:
      anyKeywords: ["软件分区", "运行分区", "ARINC653", "ARINC 653", "进程", "process"]
    content: |
      process 分区名
      end 分区名;

      process implementation 分区名.impl
      subcomponents
        任务名 : thread 任务名.impl;
      end 分区名.impl;

      规则：
      1. process 只用于软件分区或进程。
      2. 每个分区内部包含其对应任务(thread)。

  - id: task
    title: 任务模板
    trigger:
      anyKeywords: ["任务", "thread"]
    content: |
      thread 任务名
      end 任务名;

      thread implementation 任务名.impl
      end 任务名.impl;

  - id: network_interface
    title: 网络接口模板
    trigger:
      anyKeywords: ["网络接口", "网口", "Network_interface", "Net_interface"]
    content: |
      device 网络接口名
      end 网络接口名;

      device implementation 网络接口名.impl
      end 网络接口名.impl;

  - id: processor
    title: 处理器模板
    trigger:
      anyKeywords: ["处理器", "分区运行", "网络接口运行", "运行于", "processor"]
    content: |
      processor 处理器名
      end 处理器名;

      processor implementation 处理器名.impl
      subcomponents
        分区名_runtime : virtual processor 分区名_runtime.impl;
        网络接口名_runtime : virtual processor 网络接口名_runtime.impl;
      end 处理器名.impl;

      virtual processor 分区名_runtime
      end 分区名_runtime;

      virtual processor implementation 分区名_runtime.impl
      end 分区名_runtime.impl;

      规则：
      1. 需求中"某分区运行"对应一个 virtual processor。
      2. 需求中"网络接口运行"也对应一个 virtual processor。
      3. virtual processor 命名为 对象名_runtime。
      4. 所有 virtual processor 都需要单独声明和实现。
      5. 严禁在 processor 的 subcomponents 中直接声明 process！

  - id: memory
    title: 存储器模板
    trigger:
      anyKeywords: ["存储器", "内存", "memory"]
    content: |
      memory 存储器名
      end 存储器名;

      memory implementation 存储器名.impl
      subcomponents
        分区名_memory : memory 分区名_memory.impl;
        网络接口名_memory : memory 网络接口名_memory.impl;
      end 存储器名.impl;

      memory 分区名_memory
      end 分区名_memory;

      memory implementation 分区名_memory.impl
      end 分区名_memory.impl;

      规则：
      1. 需求中"某分区内存"对应一个 memory 子组件。
      2. 需求中"网络接口内存"也对应一个 memory 子组件。
      3. 所有 memory 都需要单独声明和实现。

  - id: device
    title: 设备模板
    trigger:
      anyKeywords: ["设备", "传感器", "控制面板", "油门", "舵", "device"]
    content: |
      device 设备名
      end 设备名;

      device implementation 设备名.impl
      end 设备名.impl;

  - id: bus
    title: 总线模板
    trigger:
      anyKeywords: ["总线", "PCIE", "PCIe", "bus"]
    skipIfKeywords: ["0个总线", "0 个总线", "总线为0", "总线为 0", "无总线", "没有总线"]
    content: |
      bus 总线类型名
      end 总线类型名;

      bus implementation 总线类型名.impl
      end 总线类型名.impl;

  - id: data
    title: 数据模板
    trigger:
      anyKeywords: ["数据", "当前", "目标", "状态", "指令", "data"]
    content: |
      data 数据名
      end 数据名;

      data implementation 数据名.impl
      end 数据名.impl;

  - id: subprogram
    title: 程序模板
    trigger:
      anyKeywords: ["程序", "初始化", "运行程序", "终止", "启动", "subprogram"]
    content: |
      subprogram 程序名
      end 程序名;

      subprogram implementation 程序名.impl
      end 程序名.impl;

      规则：
      1. 模块与设备程序包括：Initialization_program、Run_program 等。
      2. 程序名称必须与需求语义一致。

  - id: naming
    title: 命名规则
    always: true
    content: |
      1. 中文名称转换为英文直译，英文名称使用下划线连接。
      2. 严禁使用 System, Process 等 AADL 保留关键字作为名称。

order:
  content: |
    生成顺序：
    1. package
    2. 顶层 system 及 implementation
    3. 系统管理器 device 及 implementation
    4. 系统模块 system 及 implementation
    5. 模块管理器 device 及 implementation
    6. 各 system 子系统及 implementation
    7. 各 process 软件分区及 implementation
    8. 各 thread 任务及 implementation
    9. 网络接口 device 及 implementation
    10. processor 及 processor implementation
    11. virtual processor 声明及 implementation
    12. memory 及 implementation
    13. 子 memory 声明及 implementation
    14. 外部 device 声明及 implementation
    15. bus 声明及 implementation
    16. data 声明及 implementation
    17. subprogram 声明及 implementation
    18. end package

forbidden:
  content: |
    禁止规则：
    1. 不要生成需求中未定义的连接、端口、属性、线程、进程、设备、总线或数据。
    2. 如果需求中总线为 0，则不要生成 bus。
    3. 不要添加自然语言解释，不要输出代码块标记（如 ```aadl）。
    4. 严禁使用 system, process, thread 等关键字直接作为组件名称。
    5. 严禁在 processor、memory、device 等物理硬件的 subcomponents 中直接嵌套 process、thread 等软件组件。
    6. 【★严重警告★】严禁省略组件类型声明的 end！每个组件类型声明后必须有 "end 组件名;"。

example:
  title: AADL生成示例
  description: 以下是一个完整的AADL模型示例，请参考其格式生成代码
  content: |
    package OS_Arch 
     public 
       -- ======================================= 
       -- 顶层系统容器 
       -- ======================================= 
       system Top_System 
       end Top_System; 

       system implementation Top_System.impl 
         subcomponents 
           -- 硬件实例 
           MainProcessor : processor MainProcessor.impl; 
           RAM : memory RAM.impl; 
           Flash : memory Flash.impl; 
           SerialPort : device SerialPort.impl; 
           CANController : device CANController.impl; 
           EthernetController : device EthernetController.impl; 
           HardwareTimer : device HardwareTimer.impl; 
           WatchdogTimer : device WatchdogTimer.impl; 
           
           -- 软件实例 (Process从Processor中移出，放在System下) 
           KernelProcess : process KernelProcess.impl; 
           
         properties 
           -- 将软件进程绑定到硬件处理器上 (这是AADL标准做法) 
           Actual_Processor_Binding => (reference (MainProcessor)) applies to KernelProcess; 
       end Top_System.impl; 

       -- ======================================= 
       -- 软件组件定义 (补充了所有的 end) 
       -- ======================================= 
       process KernelProcess 
       end KernelProcess; 

       process implementation KernelProcess.impl 
         subcomponents 
           TaskScheduler : thread TaskScheduler.impl; 
           TimerManager : thread TimerManager.impl; 
           InterruptHandler : thread InterruptHandler.impl; 
           MemoryManager : thread MemoryManager.impl; 
           CommunicationManager : thread CommunicationManager.impl; 
           FileSystem : thread FileSystem.impl; 
           WatchdogManager : thread WatchdogManager.impl; 
           FaultDetector : thread FaultDetector.impl; 
           PerformanceMonitor : thread PerformanceMonitor.impl; 
       end KernelProcess.impl; 

       thread TaskScheduler 
       end TaskScheduler; 
       thread implementation TaskScheduler.impl 
       end TaskScheduler.impl; 

       thread TimerManager 
       end TimerManager; 
       thread implementation TimerManager.impl 
       end TimerManager.impl; 

       thread InterruptHandler 
       end InterruptHandler; 
       thread implementation InterruptHandler.impl 
       end InterruptHandler.impl; 

       thread MemoryManager 
       end MemoryManager; 
       thread implementation MemoryManager.impl 
       end MemoryManager.impl; 

       thread CommunicationManager 
       end CommunicationManager; 
       thread implementation CommunicationManager.impl 
       end CommunicationManager.impl; 

       thread FileSystem 
       end FileSystem; 
       thread implementation FileSystem.impl 
       end FileSystem.impl; 

       thread WatchdogManager 
       end WatchdogManager; 
       thread implementation WatchdogManager.impl 
       end WatchdogManager.impl; 

       thread FaultDetector 
       end FaultDetector; 
       thread implementation FaultDetector.impl 
       end FaultDetector.impl; 

       thread PerformanceMonitor 
       end PerformanceMonitor; 
       thread implementation PerformanceMonitor.impl 
       end PerformanceMonitor.impl; 

       -- ======================================= 
       -- 硬件组件定义 (补充了所有的 end) 
       -- ======================================= 
       processor MainProcessor 
       end MainProcessor; 
       processor implementation MainProcessor.impl 
       end MainProcessor.impl; 

       memory RAM 
       end RAM; 
       memory implementation RAM.impl 
       end RAM.impl; 

       memory Flash 
       end Flash; 
       memory implementation Flash.impl 
       end Flash.impl; 

       device SerialPort 
       end SerialPort; 
       device implementation SerialPort.impl 
       end SerialPort.impl; 

       device CANController 
       end CANController; 
       device implementation CANController.impl 
       end CANController.impl; 

       device EthernetController 
       end EthernetController; 
       device implementation EthernetController.impl 
       end EthernetController.impl; 

       device HardwareTimer 
       end HardwareTimer; 
       device implementation HardwareTimer.impl 
       end HardwareTimer.impl; 

       device WatchdogTimer 
       end WatchdogTimer; 
       device implementation WatchdogTimer.impl 
       end WatchdogTimer.impl; 

     end OS_Arch;